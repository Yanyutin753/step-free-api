name: Build and Push Docker Image

on:
  release:
    types: [created]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag Name'
        required: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        platform: [linux/amd64, linux/arm64]
    steps:
      - name: Checkout
        uses: actions/checkout@v2

      - name: Docker Setup QEMU
        uses: docker/setup-qemu-action@v1

      - name: Docker Setup Buildx
        uses: docker/setup-buildx-action@v1

      - name: Docker Login to Docker Hub
        uses: docker/login-action@v1
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Docker Login to GHCR
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Tag
        id: tag_name
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]
          then 
              echo "::set-output name=tag::${{ github.event.inputs.tag }}"
          elif [[ "${{ github.event_name }}" == "release" ]]
          then 
              echo "::set-output name=tag::${{ github.ref_name }}"
          else 
              echo "::set-output name=tag::latest"
          fi

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v4
        with:
          images: |
            ghcr.io/${{ github.repository }}

      - name: Build and Push Docker image
        uses: docker/build-push-action@v3
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            yangclivia/step-free-api:${{ steps.tag_name.outputs.tag }}
            yangclivia/step-free-api:latest
            ${{ steps.tag_name.outputs.tag }}
            latest
          platforms: ${{ matrix.platform }}
          build-args: TARGETPLATFORM=${{ matrix.platform }}
