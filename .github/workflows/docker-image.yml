name: Build and Push Docker Image

on:
  release:
    types: [created]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag Name'
        required: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        platform: [linux/amd64, linux/arm64]
    steps:
      - name: Checkout
        uses: actions/checkout@v2

      - name: Docker Setup QEMU
        uses: docker/setup-qemu-action@v1

      - name: Docker Setup Buildx
        uses: docker/setup-buildx-action@v1

      - name: Docker Login to Docker Hub
        uses: docker/login-action@v1
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Docker Login to GHCR
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Convert repository name to lowercase
        id: repo-name-lowercase
        run: echo "::set-output name=repo::$(echo ${{ github.repository }} | awk '{print tolower($0)}')"

      - name: Extract Tag
        id: tag_name
        shell: bash
        run: echo "::set-output name=tag::${{ github.ref == 'refs/head/main' && 'latest' || github.ref_name }}"

      - name: Build and Push Docker image
        uses: docker/build-push-action@v2
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            yangclivia/step-free-api:${{ steps.tag_name.outputs.tag }}
            yangclivia/step-free-api:latest
            ghcr.io/${{ steps.repo-name-lowercase.outputs.repo }}:${{ steps.tag_name.outputs.tag }}
            ghcr.io/${{ steps.repo-name-lowercase.outputs.repo }}:latest
          platforms: ${{ matrix.platform }}
          build-args: TARGETPLATFORM=${{ matrix.platform }}
