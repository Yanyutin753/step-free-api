name: Build and Push Docker Image

on:
  release:
    types: [created]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag Name'
        required: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v2

      - name: Docker Setup QEMU
        uses: docker/setup-qemu-action@v1

      - name: Docker Setup Buildx
        uses: docker/setup-buildx-action@v1

      - name: Docker Login to Docker Hub
        uses: docker/login-action@v1
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Docker Login to GHCR
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v4
        with:
          tags: |
            type=raw,value=latest
            type=ref,event=tag

      - name: Convert repository name to lowercase
        id: repo-all-name
        run: echo "::set-output name=repo::$(echo ${{ github.repository }} | awk '{print tolower($0)}')"
        
      - name: Convert repo name to lowercase
        id: repo_name
        run: echo "::set-output name=repo::$(echo "${{ github.repository_name }}" | awk '{print tolower($0)}')"
        
      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            yangclivia/${{ steps.repo_name.outputs.repo }}:${{ steps.tag_name.outputs.tags }}
            yangclivia/${{ steps.repo_name.outputs.repo }}:latest
            ghcr.io/${{ steps.repo-all-name.outputs.repo }}:${{ steps.tag_name.outputs.tags }}
            ghcr.io/${{ steps.repo-all-name.outputs.repo }}:latest
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max
